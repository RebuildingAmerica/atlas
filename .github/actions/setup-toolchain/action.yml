name: Setup Atlas toolchain
description: Install pnpm, Node, optional Python+uv, and workspace dependencies for Atlas CI jobs.

inputs:
  python:
    description: Whether to install Python and uv.
    required: false
    default: "true"
  install-deps:
    description: Whether to run `pnpm install --frozen-lockfile` after toolchain setup.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: "24"
        cache: "pnpm"

    - if: inputs.python == 'true'
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: "3.12"

    - if: inputs.python == 'true'
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        enable-cache: true
        cache-dependency-glob: "api/uv.lock"

    - if: inputs.install-deps == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

    - if: inputs.install-deps == 'true' && inputs.python == 'true'
      shell: bash
      run: cd api && uv sync --frozen --extra dev
