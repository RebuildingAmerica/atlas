name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, push, and attest atlas-api
        uses: ./.github/actions/build-attest-push
        with:
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/atlas-images/atlas-api
          tag: ${{ github.sha }}
          context: .
          dockerfile: api/Dockerfile
          cache-scope: atlas-api

      - name: Build, push, and attest atlas-web
        uses: ./.github/actions/build-attest-push
        with:
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/atlas-images/atlas-web
          tag: ${{ github.sha }}
          context: ./app
          cache-scope: atlas-web

      - name: Deploy atlas-api
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: atlas-api
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/atlas-images/atlas-api:${{ github.sha }}
          flags: |
            --ingress=all
            --allow-unauthenticated
            --min-instances=0
            --max-instances=4
            --memory=768Mi
            --cpu=1
            --timeout=900
            --concurrency=1
            --port=8000
          env_vars: |
            ENVIRONMENT=production
            LOG_LEVEL=info
            DATABASE_BACKEND=postgres
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            SEARCH_API_KEY=${{ secrets.SEARCH_API_KEY }}
            ATLAS_AUTH_INTERNAL_SECRET=${{ secrets.ATLAS_AUTH_INTERNAL_SECRET }}
            ATLAS_PUBLIC_URL=${{ secrets.ATLAS_PUBLIC_URL }}
            CORS_ORIGINS=["${{ secrets.ATLAS_PUBLIC_URL }}"]

      - name: Get API service URL
        id: api-url
        run: |
          URL=$(gcloud run services describe atlas-api --region=${{ secrets.GCP_REGION }} --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deploy atlas-web
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: atlas-web
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/atlas-images/atlas-web:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=2
            --memory=512Mi
            --cpu=1
            --port=3000
          env_vars: |
            ATLAS_PUBLIC_URL=${{ secrets.ATLAS_PUBLIC_URL }}
            ATLAS_AUTH_BASE_PATH=/api/auth
            ATLAS_SERVER_API_PROXY_TARGET=${{ steps.api-url.outputs.url }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ATLAS_AUTH_INTERNAL_SECRET=${{ secrets.ATLAS_AUTH_INTERNAL_SECRET }}
            ATLAS_AUTH_ALLOWED_EMAILS=${{ secrets.ATLAS_AUTH_ALLOWED_EMAILS }}
            ATLAS_EMAIL_PROVIDER=resend
            ATLAS_EMAIL_RESEND_API_KEY=${{ secrets.ATLAS_EMAIL_RESEND_API_KEY }}

      - name: Ensure Cloud Scheduler job for autonomous discovery
        env:
          API_URL: ${{ steps.api-url.outputs.url }}
          REGION: ${{ secrets.GCP_REGION }}
          SECRET: ${{ secrets.ATLAS_AUTH_INTERNAL_SECRET }}
        run: |
          JOB_NAME=atlas-discovery-scheduled
          if gcloud scheduler jobs describe "$JOB_NAME" --location="$REGION" > /dev/null 2>&1; then
            gcloud scheduler jobs update http "$JOB_NAME" \
              --location="$REGION" \
              --uri="${API_URL}/api/discovery-runs/scheduled" \
              --http-method=POST \
              --headers="Content-Type=application/json,X-Atlas-Internal-Secret=${SECRET}" \
              --schedule="0 2 * * *" \
              --time-zone="America/Chicago" \
              --attempt-deadline=900s \
              --quiet
          else
            gcloud scheduler jobs create http "$JOB_NAME" \
              --location="$REGION" \
              --uri="${API_URL}/api/discovery-runs/scheduled" \
              --http-method=POST \
              --headers="Content-Type=application/json,X-Atlas-Internal-Secret=${SECRET}" \
              --schedule="0 2 * * *" \
              --time-zone="America/Chicago" \
              --attempt-deadline=900s \
              --quiet
          fi

      - name: Check synthetics enablement
        id: synthetics-check
        env:
          OPENSTATUS_API_KEY: ${{ secrets.OPENSTATUS_API_KEY }}
        run: |
          if [ -n "$OPENSTATUS_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OpenStatus synthetics
        if: steps.synthetics-check.outputs.enabled == 'true'
        uses: openstatushq/openstatus-github-action@v1
        with:
          api_key: ${{ secrets.OPENSTATUS_API_KEY }}
        continue-on-error: true
