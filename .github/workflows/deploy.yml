name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit # pragma: allowlist secret

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Artifact Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build, push, and attest atlas-api
        uses: ./.github/actions/build-attest-push
        with:
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/atlas-images/atlas-api
          tag: ${{ github.sha }}
          context: .
          dockerfile: api/Dockerfile
          cache-scope: atlas-api

      - name: Deploy atlas-api
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.1
        with:
          service: atlas-api
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/atlas-images/atlas-api:${{ github.sha }}
          flags: |
            --ingress=all
            --allow-unauthenticated
            --min-instances=0
            --max-instances=4
            --memory=768Mi
            --cpu=1
            --timeout=900
            --concurrency=1
            --port=8000
          env_vars: |
            ENVIRONMENT=production
            LOG_LEVEL=info
            DATABASE_BACKEND=postgres
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            SEARCH_API_KEY=${{ secrets.SEARCH_API_KEY }}
            ATLAS_AUTH_INTERNAL_SECRET=${{ secrets.ATLAS_AUTH_INTERNAL_SECRET }}
            ATLAS_PUBLIC_URL=${{ secrets.ATLAS_PUBLIC_URL }}
            CORS_ORIGINS=["${{ secrets.ATLAS_PUBLIC_URL }}"]

      - name: Get API service URL and revision
        id: api-url
        run: |
          URL=$(gcloud run services describe atlas-api --region=${{ secrets.GCP_REGION }} --format='value(status.url)')
          REVISION=$(gcloud run services describe atlas-api --region=${{ secrets.GCP_REGION }} --format='value(status.latestReadyRevisionName)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

      - name: Smoke-test atlas-api
        env:
          API_URL: ${{ steps.api-url.outputs.url }}
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "$API_URL/health"; then
              exit 0
            fi
            echo "atlas-api health check failed (attempt $attempt); retrying in 5s..."
            sleep 5
          done
          echo "::error::atlas-api never returned a healthy response from $API_URL/health"
          exit 1

      - name: Ensure Cloud Scheduler job for autonomous discovery
        env:
          API_URL: ${{ steps.api-url.outputs.url }}
          REGION: ${{ secrets.GCP_REGION }}
          SECRET: ${{ secrets.ATLAS_AUTH_INTERNAL_SECRET }}
        run: |
          JOB_NAME=atlas-discovery-scheduled
          if gcloud scheduler jobs describe "$JOB_NAME" --location="$REGION" > /dev/null 2>&1; then
            gcloud scheduler jobs update http "$JOB_NAME" \
              --location="$REGION" \
              --uri="${API_URL}/api/discovery-runs/scheduled" \
              --http-method=POST \
              --headers="Content-Type=application/json,X-Atlas-Internal-Secret=${SECRET}" \
              --schedule="0 2 * * *" \
              --time-zone="America/Chicago" \
              --attempt-deadline=900s \
              --quiet
          else
            gcloud scheduler jobs create http "$JOB_NAME" \
              --location="$REGION" \
              --uri="${API_URL}/api/discovery-runs/scheduled" \
              --http-method=POST \
              --headers="Content-Type=application/json,X-Atlas-Internal-Secret=${SECRET}" \
              --schedule="0 2 * * *" \
              --time-zone="America/Chicago" \
              --attempt-deadline=900s \
              --quiet
          fi

      - name: Check synthetics enablement
        id: synthetics-check
        env:
          OPENSTATUS_API_KEY: ${{ secrets.OPENSTATUS_API_KEY }}
        run: |
          if [ -n "$OPENSTATUS_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OpenStatus synthetics
        if: steps.synthetics-check.outputs.enabled == 'true'
        uses: openstatushq/openstatus-github-action@adb7e3ec5e8918d11b7e73ffa74a873ce62b5f75 # v1
        with:
          api_key: ${{ secrets.OPENSTATUS_API_KEY }}
        continue-on-error: true

      - name: Write deploy summary
        if: always()
        env:
          API_URL: ${{ steps.api-url.outputs.url }}
          API_REVISION: ${{ steps.api-url.outputs.revision }}
          IMAGE_REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/atlas-images
        run: |
          {
            echo "## Atlas deploy"
            echo
            echo "atlas-web is deployed by Vercel's GitHub integration on push to main; this workflow only ships atlas-api."
            echo
            echo "| Service | URL | Revision | Image |"
            echo "| --- | --- | --- | --- |"
            echo "| atlas-api | ${API_URL:-_n/a_} | ${API_REVISION:-_n/a_} | \`${IMAGE_REGISTRY}/atlas-api:${{ github.sha }}\` |"
            echo
            echo "Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No SLACK_DEPLOY_WEBHOOK_URL configured; skipping notification."
            exit 0
          fi
          PAYLOAD=$(jq -nc \
            --arg text "Atlas production deploy failed for ${COMMIT}. See ${RUN_URL}" \
            '{text: $text}')
          curl -fsS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
