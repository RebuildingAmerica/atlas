name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    - cron: "0 12 * * 1"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - name: Validate Turbo task selectors
        run: pnpm run turbo:validate
      - name: Typecheck and lint
        run: pnpm exec turbo run typecheck lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - name: Run tests with coverage
        run: pnpm run test:coverage

  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - name: Install Playwright browsers
        run: pnpm --filter @rebuildingamerica/atlas-app exec playwright install --with-deps chromium
      - name: Run Playwright acceptance suite
        env:
          CI: "true"
        run: pnpm exec turbo run '@rebuildingamerica/atlas-app#test:acceptance'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14

  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - name: Run API contract tests
        run: pnpm run contract:test

  openapi-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - name: Regenerate OpenAPI spec and client
        run: |
          pnpm run openapi
          pnpm --filter @rebuildingamerica/atlas-app run api-client
      - name: Verify generated artifacts are up to date
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated OpenAPI artifacts are out of date. Run 'pnpm openapi && pnpm --filter @rebuildingamerica/atlas-app run api-client' and commit the result."
            exit 1
          fi

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
        with:
          python: "false"
      - name: Validate docs
        run: pnpm run docs:validate
      - name: Check for broken links
        run: pnpm run docs:broken-links

  compose-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
        with:
          python: "false"
      - name: Validate Compose configurations
        run: pnpm run compose:validate

  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-toolchain
        with:
          install-deps: "false"
      - name: Scan for committed secrets
        run: pnpm run secrets:scan
