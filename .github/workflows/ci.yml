name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    - cron: "0 12 * * 1"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - name: Typecheck, lint, and test
        run: pnpm run quality

  compose-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          python: "false"
      - name: Validate Compose configurations
        run: pnpm run compose:validate
