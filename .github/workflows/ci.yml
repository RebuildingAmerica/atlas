name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 12 * * 1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Enable Corepack
        run: corepack enable
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Sync API dependencies
        run: cd api && uv sync --frozen --extra dev
      - name: Verify production graph
        run: pnpm run verify

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable Corepack
        run: corepack enable
      - name: Validate Compose configurations
        run: pnpm run compose:validate
