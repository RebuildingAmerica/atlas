# yaml-language-server: $schema=https://www.openstatus.dev/schema.json
#
# OpenStatus monitor definitions for Atlas.
# Apply with: openstatus monitors apply
# Import existing monitors with: openstatus monitors import

atlas-app:
  name: "Atlas"
  frequency: "5m"
  active: true
  regions: ["iad", "ams", "syd"]
  retry: 2
  kind: http
  request:
    url: https://atlas.rebuildingus.org
    method: GET
  assertions:
    - kind: statusCode
      compare: eq
      target: 200

atlas-api:
  name: "Atlas API"
  frequency: "5m"
  active: true
  regions: ["iad", "ams", "syd"]
  retry: 2
  kind: http
  request:
    url: https://atlas.rebuildingus.org/api/health
    method: GET
  assertions:
    - kind: statusCode
      compare: eq
      target: 200
    - kind: textBody
      compare: eq
      target: '{"status":"ok"}'
