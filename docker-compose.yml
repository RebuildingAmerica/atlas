services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - atlas-data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///data/atlas.db
    command: uvicorn atlas.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./app/src:/app/src
    depends_on:
      api:
        condition: service_healthy
    command: pnpm run dev -- --host 0.0.0.0

volumes:
  atlas-data:
